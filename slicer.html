<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="assets/images/icons/n3xt-favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
        rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/slicer.css">
    <script type="importmap">
        {
            "imports": {
                "three": "./node_modules/three/build/three.module.js",
                "three/examples/jsm/loaders/STLLoader": "./node_modules/three/examples/jsm/loaders/STLLoader.js",
                "three/examples/jsm/controls/OrbitControls": "./node_modules/three/examples/jsm/controls/OrbitControls.js",
                "three/examples/jsm/controls/DragControls": "./node_modules/three/examples/jsm/controls/DragControls.js"
            }
        }
    </script>
    <title>N3XT App</title>
</head>

<body>
    <div class="app__inner">
        <header class="slicer__header">
            <div class="slicer__header-inner">
                <a href="/" class="slicer__back">
                    <i class="fa-solid fa-arrow-left"></i>
                    Back
                </a>
                <label for="loadSTLButton" class="app-btn">Load STL</label>
                <input type="file" id="loadSTLButton" accept=".stl">

                <button class="app-btn" id="sliceButton">Slice</button>
                <button class="app-btn" id="drawLayersButton">Draw Layers</button>
                <button class="app-btn" id="drawPointsButton">Draw Points</button>

                <button id="clearButton" class="app-btn app-btn--danger">Clear</button>
            </div>
        </header>
        <canvas class="slicer__canvas" id="slicerCanvas"></canvas>
    </div>

    <div id="transformUI" style="position: absolute; top: 10px; right: 10px; background-color: white; padding: 10px; border: 1px solid #ccc; border-radius: 5px; display: none;">
        <div class="transform-group">
            <label>Scale: <input type="number" id="scaleInput" value="100" style="width: 50px;"></label>
        </div>
        <div class="transform-group">
            <label>Rotation X: <input type="number" id="rotationXInput" value="0" style="width: 50px;"></label>
            <label>Rotation Y: <input type="number" id="rotationYInput" value="0" style="width: 50px;"></label>
            <label>Rotation Z: <input type="number" id="rotationZInput" value="0" style="width: 50px;"></label>
        </div>
        <div class="transform-group">
            <label>Position X: <input type="number" id="positionXInput" placeholder="Position X" style="width: 50px;"></label>
            <label>Position Z: <input type="number" id="positionZInput" placeholder="Position Z" style="width: 50px;"></label>
        </div>
    </div>

    <script type="module" src="assets/js/main.js"></script>
</body>

</html>
